name: Flutter Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Build APK
        run: |
          flutter pub get
          cd android
          
          # HATA ÇÖZÜCÜ: Kendi indirme scriptimiz yerine 
          # flutter'ın kendi gradle yapılandırıcısını kullanıyoruz.
          # Bu komut, projede bir 'gradlew' yoksa bile onu otomatik 
          # Flutter SDK'nın standartlarına göre en doğru şekilde oluşturur.
          ./gradlew wrapper --gradle-version 8.4
          
          # Çalıştırma iznini ver
          chmod +x gradlew
          
          # Derlemeyi başlat
          ./gradlew assembleRelease
          
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          
