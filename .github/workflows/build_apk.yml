name: Flutter Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.x' }
      
      - name: Build APK
        run: |
          flutter pub get
          cd android
          
          # HATA ÇÖZÜCÜ: Sistemdeki (hata veren) gradle'ı kullanmamak için 
          # PATH değişkeninden temizliyoruz.
          export PATH=/usr/bin:$PATH
          
          # Wrapper'ı 8.4 olarak güncelliyoruz
          rm -rf gradle/wrapper/
          ./gradlew wrapper --gradle-version 8.4
          chmod +x gradlew
          
          # SADECE WRAPPER KULLANARAK DERLE
          # Sistemdeki /usr/bin/gradle komutu asla devreye girmeyecek
          ./gradlew assembleRelease --no-daemon --stacktrace
          
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          
