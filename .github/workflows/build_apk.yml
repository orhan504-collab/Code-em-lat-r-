name: Flutter Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0' # Gradle 8.4 ile uyumlu kararlı sürüm

      - name: Build APK
        run: |
          # 1. Pub paketlerini al
          flutter pub get
          
          # 2. Android klasörüne git
          cd android
          
          # 3. Gradle wrapper dosyasını doğrudan internetten indirip kur
          curl -s https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          
          # 4. Doğrudan bin/gradle üzerinden derleme yap (gradlew dosyasını atla)
          ./gradle-8.4/bin/gradle assembleRelease
          
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          
