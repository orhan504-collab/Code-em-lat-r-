name: Flutter Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Build APK
        run: |
          # 1. Pub paketlerini al
          flutter pub get
          
          # 2. Android klasörüne git
          cd android
          
          # 3. KÖKLÜ DEĞİŞİM: Gradle Wrapper'ı Flutter SDK'nın 
          # kendi içindeki güvenli versiyonla eşle
          ./gradlew wrapper --gradle-version 8.4 --distribution-type bin
          
          # 4. SİSTEM GRADLE'INI DEĞİL, WRAPPER'I ÇALIŞTIR
          # --no-build-cache ve --no-daemon ile temiz bir başlangıç
          ./gradlew assembleRelease --no-daemon --no-build-cache
          
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          
