name: Flutter Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Prepare Android Environment
        run: |
          # Flutter SDK yolunu local.properties içine yazıyoruz
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          
          # Gradle Wrapper'ı temizle ve kararlı sürüme eşitle
          cd android
          rm -rf gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build APK
        run: |
          cd android
          # Eklentiyi bulamama hatasına karşı doğrudan derleme tetikleme
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          
