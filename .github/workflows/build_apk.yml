name: Flutter Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Build APK
        run: |
          # 1. Proje içindeki bağımlılıkları al
          flutter pub get
          
          # 2. Android klasörüne geç
          cd android
          
          # 3. KÖKLÜ ÇÖZÜM: Mevcut gradle klasörünü sil ve Flutter SDK'nın 
          # kendi içindeki doğru sürümü eşleştirmesini bekle
          rm -rf gradle/wrapper/
          
          # 4. Gradle Wrapper'ı yeniden oluştur
          gradle wrapper --gradle-version 8.4
          
          # 5. Gradle daemon'ı tamamen kapat (Hataları önler)
          ./gradlew assembleRelease --no-daemon --stacktrace
          
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          
