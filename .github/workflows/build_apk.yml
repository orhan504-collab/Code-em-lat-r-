name: Flutter Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with: { distribution: 'zulu', java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.x' }
      
      - name: Build with Gradle
        run: |
          # Flutter derleme sistemini değil, doğrudan Gradle sistemini tetikliyoruz
          flutter pub get
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          # gradlew yerine 'gradle' komutunu kullanarak wrapper bağımlılığından kurtuluyoruz
          gradle assembleRelease --no-daemon -p android
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          
